server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # config.json is swapped per brand at startup and must reflect a redeploy
    # immediately — never cache it.
    location = /config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # index.html is the SPA shell; keep it fresh so new builds are picked up.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Fingerprinted build assets — safe to cache aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images / fonts / icons.
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Angular router: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
}
