<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>Loading…</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Non-bank financial institution providing responsible lending and financial services.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Apply the saved / preferred theme before first paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('app.theme');
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap&subset=cyrillic,cyrillic-ext,latin"
    rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
