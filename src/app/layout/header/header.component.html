<header
  class="site-header"
  [class.site-header--scrolled]="scrolled()"
  [class.site-header--hidden]="hidden()"
>
  <div class="container site-header__inner">
    <a class="brand" href="#top" (click)="closeMenu()">
      <span class="brand__logo">
        <img [src]="config.brand.images.logo" [alt]="i18n.brandName()" />
      </span>
      <span class="brand__name">{{ i18n.brandName() }}</span>
    </a>

    <nav class="nav" [class.nav--open]="menuOpen()" aria-label="Primary">
      @for (item of navItems; track item.fragment) {
        <a class="nav__link" [href]="'#' + item.fragment" (click)="closeMenu()">
          {{ i18n.t(item.labelKey) }}
        </a>
      }

      <div class="nav__controls">
        <button
          type="button"
          class="icon-btn theme-btn"
          [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
          (click)="theme.toggle()"
        >
          @if (theme.theme() === 'dark') {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
          }
        </button>

        <div class="nav__lang">
          @for (lang of i18n.available; track lang) {
            <button
              type="button"
              class="lang-btn"
              [class.lang-btn--active]="i18n.lang() === lang"
              (click)="switchLang(lang)"
            >
              {{ lang.toUpperCase() }}
            </button>
          }
        </div>
      </div>
    </nav>

    <button
      type="button"
      class="burger"
      [class.burger--open]="menuOpen()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle menu"
      (click)="toggleMenu()"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="scroll-progress" [style.width.%]="progress()"></div>
</header>
